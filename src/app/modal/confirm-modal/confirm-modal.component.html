<div mat-dialog-content>
  <div class="px-4 pt-2">
    <p class="text-lg font-medium">{{ data.title || "Confirm" }}</p>
    <div class="flex items-center h-20">
      <p class="mt-3 text-sm text-gray-700">
        {{ data.message || "Are you sure?" }}
      </p>
    </div>
  </div>
</div>

<div class="flex gap-2 p-4 pt-0">
  <button mat-button class="w-full py-2 bg-gray-200 rounded" (click)="cancel()">
    Cancel
  </button>
  <button
    mat-button
    color="primary"
    class="bg-[#5766dc] w-full py-2 text-white rounded"
    (click)="confirm()"
  >
    Confirm
  </button>
</div>
