<div class="flex flex-col items-center justify-center w-full h-full sm:px-7">
  <div
    class="w-full p-5 shadow-md mx-auto overflow-auto rounded-lg max-w-xl bg-white dark:bg-[#212b36] border-[#ececec] dark:border-[#46525f] border-[1px] mt-1"
  >
    <div class="lg:my-2">
      <h2 class="block text-xl font-medium text-center">Forgot Password</h2>
    </div>

    <div>
      <form [formGroup]="forgotForm">
        <div class="flex flex-col items-start mb-2 gap-y-1">
          <label class="leading-6 inline-block text-[15px]">Email</label>
          <div class="relative w-full">
            <input
              autocomplete="on"
              type="email"
              class="w-full p-2.6 mt-1 mb-3 tracking-wider border-[1px] rounded-lg bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-500 dark:placeholder:text-gray-400 border-[#ececec] dark:border-[#46525f] outline-none dark:focus:border-violet-700 focus:border-violet-700"
              placeholder="Enter your email"
              name="email"
              [formControl]="email"
              required=""
            />
          </div>

          <div *ngIf="email.errors?.['required'] && (email.dirty || email.touched)">
            <div class="text-red-500 text-[13px] leading-4 block relative bottom-1">
              Email cannot be left blank
            </div>
          </div>

          <div *ngIf="email.errors?.['email'] && (email.dirty || email.touched)">
            <div class="text-red-500 text-[13px] leading-4 block relative bottom-1">
              Email is invalid
            </div>
          </div>
        </div>

        <div class="w-full text-center">
          <button
            class="w-full btn-primary"
            [disabled]="isLoading"
            (click)="onSubmit()"
            matRipple
            matRippleColor="#ffffff80"
          >
            Send verification code
          </button>
        </div>

        <div class="flex items-center justify-between mt-4 text-center">
          <p class="text-center text-[15px]">Remember your password?</p>
          <a routerLink="/login" class="text-violet-700 font-medium text-[15px]">Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
