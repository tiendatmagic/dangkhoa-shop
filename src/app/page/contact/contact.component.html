<div class="my-5">
  <div class="mt-3 text-3xl text-center">
    <div class="inline-flex items-center gap-2 mb-3">
      <p class="font-medium">CONTACT</p>
      <p class="w-8 sm:w-12 h-[1px] sm:h-[2px] bg-gray-700"></p>
    </div>
  </div>
</div>

<div class="md:flex-row flex flex-col items-start gap-12 my-10">
  <img
    alt=""
    src="https://cdn.prod.website-files.com/637dd8d62ccaf602c8ad331c/642af2c5635cbd3df4920e62_furniture%20(2).webp"
    class="rounded-lg w-full md:max-w-[450px]"
  />
  <div
    class="md:w-2/4 flex flex-col justify-center gap-6 leading-6 text-gray-600"
  >
    <div *ngIf="!loading" class="my-10">
      <div class="ck-content" [innerHTML]="contactHtml"></div>
    </div>
  </div>
</div>
