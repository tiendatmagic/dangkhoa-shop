<div
  class="rounded-lg w-full overflow-auto border-[#ececec] dark:border-[#46525f] border-[1px] glass-effect not-bg-glass shadow-md relative max-w-screen-4xl p-3"
>
  <div class="lg:px-3 pt-3">
    <div class="mb-3 text-2xl">
      <div class="flex justify-between">
        <div class="inline-flex items-center gap-2 mb-3">
          <p class="font-medium">Profile</p>
          <p class="w-8 sm:w-12 h-[1px] sm:h-[2px] bg-gray-700"></p>
        </div>
      </div>
    </div>

    <div class="mb-4">
      <nav
        class="flex items-center gap-2 bg-white/60 dark:bg-[#07121a] p-1 border border-[#ececec] dark:border-[#22303a] shadow-sm"
      >
        <a
          routerLink="information"
          routerLinkActive="text-[#5766dc] font-semibold border-b-2 border-[#5766dc]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="hover:text-gray-800 px-4 py-2 text-sm text-gray-600 transition-colors"
          >Information</a
        >
        <a
          routerLink="password"
          routerLinkActive="text-[#5766dc] font-semibold border-b-2 border-[#5766dc]"
          class="hover:text-gray-800 px-4 py-2 text-sm text-gray-600 transition-colors"
          >Password</a
        >
        <a
          routerLink="google-auth"
          routerLinkActive="text-[#5766dc] font-semibold border-b-2 border-[#5766dc]"
          class="hover:text-gray-800 px-4 py-2 text-sm text-gray-600 transition-colors"
          >Google Auth</a
        >
      </nav>
    </div>

    <router-outlet></router-outlet>
  </div>
</div>
