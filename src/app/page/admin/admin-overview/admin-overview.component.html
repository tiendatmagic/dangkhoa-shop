<div class="p-1 shadow-md rounded-xl">
  <h2 class="px-5 pt-5 mb-4 text-xl font-medium">
    Revenue Chart
  </h2>
  <apx-chart [series]="chartOptions.series" [chart]="chartOptions.chart" [xaxis]="chartOptions.xaxis"
    [stroke]="chartOptions.stroke" [fill]="chartOptions.fill" [dataLabels]="chartOptions.dataLabels"
    [yaxis]="chartOptions.yaxis" [grid]="chartOptions.grid" [colors]="chartOptions.colors"
    [tooltip]="chartOptions.tooltip">
  </apx-chart>
</div>
