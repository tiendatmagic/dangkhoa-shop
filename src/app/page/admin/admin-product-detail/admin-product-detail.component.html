<div
  class="rounded-lg w-full overflow-auto border-[#ececec] dark:border-[#46525f] border-[1px] glass-effect not-bg-glass shadow-md relative max-w-screen-4xl p-3"
>
  <div class="lg:px-3 py-5 pt-3">
    <div class="mb-3 text-2xl">
      <div class="flex justify-between">
        <div class="inline-flex items-center gap-2 mb-3">
          <p class="font-medium">Edit Product</p>
          <p class="w-8 md:w-12 h-[1px] md:h-[2px] bg-gray-700"></p>
        </div>
      </div>
    </div>

    <!-- Input file ẩn -->
    <input
      type="file"
      #fileInput
      (change)="onFileSelected($event)"
      accept="image/*"
      hidden
    />

    <ng-container>
      <div
        class="overflow-auto border-[1px] border-[#ececec] dark:border-[#46525f] glass-effect not-bg-glass shadow-md rounded-xl px-4 py-4"
      >
        <form [formGroup]="productForm">
          <div class="md:gap-5 md:flex-row flex flex-col w-full gap-3">
            <div class="md:w-1/3 w-full">
              <div class="md:gap-5 md:flex-row flex flex-col h-full gap-2">
                <div
                  class="md:justify-center md:items-center gap-y-1 flex flex-col w-full mb-3"
                >
                  <div>
                    <label
                      for="image"
                      class="block mb-2 text-sm font-medium text-gray-900"
                      >Product image <span class="text-red-500">*</span></label
                    >
                    <div
                      class="relative w-full cursor-pointer"
                      (click)="onImageClick()"
                    >
                      <div
                        class="aspect-square max-w-48 max-h-48 group relative overflow-hidden rounded-lg"
                      >
                        <img
                          [src]="previewUrl || urlLink + imageUrl"
                          alt=""
                          (error)="handleImageError($event)"
                          class="group-hover:scale-110 object-cover w-full h-full transition-transform"
                        />
                        <div
                          class="group-hover:opacity-100 absolute top-0 left-0 flex items-center justify-center w-full h-full transition-opacity duration-300 bg-black bg-opacity-50 opacity-0"
                        >
                          <div class="p-2 bg-white rounded-full">
                            <svg
                              xmlns="http://www.w3.org/2000/svg"
                              fill="none"
                              viewBox="0 0 24 24"
                              stroke-width="1.5"
                              stroke="currentColor"
                              class="w-6 h-6"
                            >
                              <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"
                              />
                              <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z"
                              />
                            </svg>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="md:w-2/3 w-full">
              <div class="md:gap-5 md:flex-row flex flex-col gap-2">
                <div
                  class="gap-y-1 md:w-1/2 flex flex-col items-start w-full mb-3"
                >
                  <label class="block mb-2 text-sm font-medium text-gray-900">
                    Product name <span class="text-red-500">*</span>
                  </label>
                  <div class="relative w-full">
                    <input
                      autocomplete="off"
                      type="text"
                      class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                      placeholder="Enter product name"
                      [formControl]="productName"
                      minlength="1"
                      maxlength="30"
                      required
                    />
                  </div>
                </div>

                <div class="gap-y-1 md:w-1/2 flex items-end w-full gap-1 mb-3">
                  <div class="md:w-1/2 w-full">
                    <label class="block mb-2 text-sm font-medium text-gray-900">
                      Product type
                    </label>
                    <div class="relative w-full">
                      <select
                        [formControl]="productType"
                        class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                      >
                        <option value="" selected>None</option>
                        <option value="paxg">Gold - (1 XAU)</option>
                        <option value="xag">Silver - (1 XAG)</option>
                        <option value="eth">ETH</option>
                        <option value="bnb">BNB</option>
                        <option value="sol">SOL</option>
                        <option value="pol">POL</option>
                        <option value="btc">BTC</option>
                        <option value="xrp">XRP</option>
                        <option value="trx">TRX</option>
                        <option value="sui">SUI</option>
                        <option value="shib">SHIB</option>
                        <option value="doge">DOGE</option>
                        <option value="near">NEAR</option>
                        <option value="fil">FIL</option>
                        <option value="etc">ETC</option>
                        <option value="ena">ENA</option>
                        <option value="ondo">ONDO</option>
                        <option value="link">LINK</option>
                        <option value="ada">ADA</option>
                        <option value="tao">TAO</option>
                        <option value="arb">ARB</option>
                        <option value="apt">APT</option>
                        <option value="aave">AAVE</option>
                        <option value="ltc">LTC</option>
                        <option value="usdt">USDT</option>
                        <option value="usdc">USDC</option>
                      </select>
                    </div>
                  </div>
                  <div class="md:w-1/2 w-full" *ngIf="productType.value">
                    <label
                      class="text-ellipsis whitespace-nowrap block mb-2 overflow-hidden text-xs font-medium text-gray-900"
                    >
                      Price calculated by multiplication
                    </label>
                    <div class="relative w-full">
                      <input
                        autocomplete="off"
                        type="number"
                        class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                        placeholder="Enter quantity, example: 1"
                        [formControl]="quantity"
                        maxlength="30"
                      />
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="md:gap-5 md:mt-0 md:flex-row flex flex-col gap-2 mt-2"
              >
                <div
                  class="gap-y-1 md:w-1/2 flex flex-col items-start w-full mb-3"
                >
                  <div class="flex">
                    <label class="block mb-2 text-sm font-medium text-gray-900">
                      Price <span class="text-red-500">*</span>
                    </label>
                  </div>
                  <div class="relative w-full">
                    <input
                      autocomplete="off"
                      type="number"
                      class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                      placeholder="Enter price"
                      [formControl]="price"
                      maxlength="30"
                      required
                    />
                  </div>
                </div>

                <div
                  class="gap-y-1 md:w-1/2 flex flex-col items-start w-full mb-3"
                >
                  <label class="block mb-2 text-sm font-medium text-gray-900">
                    Category
                  </label>
                  <div class="relative w-full">
                    <select
                      [formControl]="category"
                      class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                    >
                      <option value="" selected>None</option>
                      <option value="men">
                        {{ categoryService.getCategoryName("men") }}
                      </option>
                      <option value="women">
                        {{ categoryService.getCategoryName("women") }}
                      </option>
                      <option value="crypto">
                        {{ categoryService.getCategoryName("crypto") }}
                      </option>
                      <option value="gold/silver">
                        {{ categoryService.getCategoryName("gold/silver") }}
                      </option>
                      <option value="other">
                        {{ categoryService.getCategoryName("other") }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div
                class="md:gap-5 md:mt-0 md:flex-row flex flex-col gap-2 mt-2"
              >
                <div
                  class="gap-y-1 md:w-1/2 flex flex-col items-start w-full mb-3"
                >
                  <label class="block mb-2 text-sm font-medium text-gray-900">
                    Is Best Seller <span class="text-red-500">*</span>
                  </label>
                  <div class="relative w-full">
                    <select
                      [formControl]="isBestSeller"
                      class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                    >
                      <option value="0">No</option>
                      <option value="1">Yes</option>
                    </select>
                  </div>
                </div>

                <div
                  class="gap-y-1 md:w-1/2 flex flex-col items-start w-full mb-3"
                >
                  <label class="block mb-2 text-sm font-medium text-gray-900">
                    Type <span class="text-red-500">*</span>
                  </label>
                  <div class="relative w-full">
                    <input
                      autocomplete="off"
                      type="text"
                      class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg"
                      placeholder="Enter type, example: S, M, L"
                      [formControl]="size"
                      maxlength="500"
                      required
                    />
                  </div>
                </div>
              </div>

              <div
                class="md:gap-5 md:mt-0 md:flex-row flex flex-col gap-2 mt-2"
              >
                <div class="gap-y-1 flex flex-col items-start w-full mb-3">
                  <label class="block mb-2 text-sm font-medium text-gray-900">
                    Description
                  </label>
                  <div class="relative w-full">
                    <textarea
                      autocomplete="off"
                      class="text-gray-900 text-sm block w-full p-2.5 bg-[#fafafa] dark:bg-[#1b212c] focus:ring-0 placeholder:text-gray-700 border-[1px] border-[#ececec] dark:border-[#46525f] dark:placeholder-gray-400 outline-none dark:focus:border-violet-600 focus:border-violet-600 rounded-lg resize-none"
                      placeholder="Enter product description"
                      [formControl]="description"
                      maxlength="1000"
                      rows="4"
                    ></textarea>
                    <small class="text-gray-500"
                      >{{ description.value?.length || 0 }}/1000</small
                    >
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="w-full mt-3 text-center">
            <button
              type="button"
              (click)="updateProduct()"
              class="btn-primary w-full"
              matRipple
              matRippleColor="#ffffff66"
              [disabled]="!productForm.valid"
            >
              Update
            </button>
          </div>
        </form>
      </div>
    </ng-container>
  </div>
</div>
